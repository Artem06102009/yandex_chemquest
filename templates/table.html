{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h1 class="title is-1 mt-6 has-text-centered">Периодическая таблица Менделеева</h1>
    <p class="has-text-centered mb-3">Наведите курсор на элемент, чтобы увидеть информацию</p>
    <div id="periodic-table" style="overflow-x: auto;">
        <table class="table is-bordered is-fullwidth">
            <thead>
                <tr>
                    <th>Период</th>
                    {% for i in range(1, 19) %}
                        <th class="has-text-centered">{{ i }}</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<style>
    .element-cell {
        cursor: help;
        padding: 8px 4px;
        text-align: center;
        transition: all 0.2s;
        background-color: #f5f5f5;
    }

    .element-cell:hover {
        background-color: #00d1b2 !important;
        color: white !important;
    }

    .element-symbol {
        font-weight: bold;
        font-size: 16px;
    }

    .element-number {
        font-size: 10px;
        color: #666;
    }

    .element-cell:hover .element-number {
        color: white;
    }

    .custom-tooltip {
        position: relative;
        display: inline-block;
        width: 100%;
    }

    .custom-tooltip .tooltip-text {
        visibility: hidden;
        position: absolute;
        z-index: 100;
        bottom: 125%;
        left: 50%;
        transform: translateX(-50%);
        background-color: #2c3e50;
        color: white;
        text-align: center;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 12px;
        width: max-content;
        max-width: 220px;
        white-space: normal;
        transition: opacity 0.3s;
    }

    .custom-tooltip .tooltip-text::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        margin-left: -5px;
        border-width: 5px;
        border-style: solid;
        border-color: #2c3e50 transparent transparent transparent;
    }


    .empty-cell {
        background-color: #e8e8e8;
        text-align: center;
    }

    .periodic-table {
        font-size: 12px;
    }

    .periodic-table th, .periodic-table td {
        padding: 4px 2px;
    }
</style>

<script>
    fetch('/api/elements')
        .then(response => response.json())
        .then(data => {
            buildTable(data.elements);
        })
<!--        .catch(error => {-->
<!--            console.error('Ошибка загрузки:', error);-->
<!--            document.getElementById('table-body').innerHTML = '<tr><td colspan="20" class="has-text-centered">Ошибка загрузки данных</td></tr>';-->
<!--        });-->

    function buildTable(elements) {
        const elementMap = {};
        elements.forEach(el => {
            const key = `${el.period}_${el.group}`;
            elementMap[key] = el;
        });

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        for (let period = 1; period <= 7; period++) {
            const row = document.createElement('tr');

            const periodCell = document.createElement('td');
            periodCell.className = 'has-text-centered';
            periodCell.innerHTML = `${period}`;
            row.appendChild(periodCell);

            for (let group = 1; group <= 18; group++) {
                const key = `${period}_${group}`;
                const element = elementMap[key];
                const cell = document.createElement('td');

                if (element) {
                    cell.className = 'element-cell';
                    cell.innerHTML = `
                        <div class="custom-tooltip">
                            <div class="element-symbol">${element.symbol}</div>
                            <div class="element-number">${element.atomic_number}</div>
                            <div class="tooltip-text">
                                <strong>${element.name}</strong><br>
                                Масса: ${element.mass}<br>
                                ЭО: ${element.en}<br>
                                Открыт: ${element.discovered}<br>
                                ${element.category}
                            </div>
                        </div>
                    `;
                } else {
                    cell.className = 'empty-cell';
                    cell.innerHTML = '—';
                }
                row.appendChild(cell);
            }
            tbody.appendChild(row);
        }
    }
</script>
{% endblock %}
